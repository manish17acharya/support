services:

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: stms
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks: [stms]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Laravel PHP-FPM ──────────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: STMS
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: stms
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      SESSION_DRIVER: cookie
      CACHE_STORE: array
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_DOMAIN:-localhost}
    depends_on:
      db:
        condition: service_healthy
    networks: [stms]

  # ── Nginx + React SPA (serves / and proxies /api to app:9000) ─────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - app
    networks: [stms]

volumes:
  db_data:

networks:
  stms:
    driver: bridge
